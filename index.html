<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Felsefe Adam Asmaca</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent-neon: #00d2ff;
            --accent-pink: #ff007f;
            --text-main: #e0e0e0;
            --success-glow: #2ecc71;
            --error-glow: #e74c3c;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Cam Efekti Kart */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 700px;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.8rem;
            margin: 0;
            background: linear-gradient(to right, var(--accent-neon), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .header p { opacity: 0.6; font-size: 0.8rem; letter-spacing: 1px; }

        /* Form Elemanları */
        .setup-area { display: flex; flex-direction: column; gap: 15px; }

        label { font-size: 0.85rem; color: var(--accent-neon); margin-left: 5px; text-transform: uppercase; }

        select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
            transition: 0.3s;
        }

        select:focus { border-color: var(--accent-neon); box-shadow: 0 0 15px rgba(0, 210, 255, 0.2); }
        option { background: #1a1a2e; color: white; }

        .btn {
            border: none;
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .start-btn {
            background: linear-gradient(45deg, var(--accent-neon), #0072ff);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }

        .start-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0, 210, 255, 0.5); }

        /* Oyun Alanı */
        #game-area { display: none; text-align: center; }

        #word-display {
            font-size: 2.2rem;
            letter-spacing: 8px;
            margin: 30px 0;
            font-family: 'monospace';
            font-weight: 700;
            color: white;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
            word-wrap: break-word;
        }

        #hint-display {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid var(--accent-pink);
            margin-bottom: 25px;
            font-style: italic;
            line-height: 1.5;
            color: #ccc;
        }

        /* Klavye Tasarımı */
        .keyboard-container { gap: 8px; margin-top: 25px; }
        .keyboard-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 6px; }
        
        .key {
            flex: 1;
            max-width: 42px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .key:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-2px); }
        .key.correct { background: var(--success-glow) !important; color: white; box-shadow: 0 0 15px var(--success-glow); border: none; }
        .key.wrong { background: var(--error-glow) !important; color: white; box-shadow: 0 0 15px var(--error-glow); border: none; }
        .key.disabled { opacity: 0.2; pointer-events: none; }

        /* SVG Çizim */
        #hangman-svg { height: 160px; filter: drop-shadow(0 0 5px rgba(0, 210, 255, 0.2)); }
        .draw-part { stroke: var(--text-main); stroke-width: 4; fill: none; stroke-linecap: round; display: none; }
        .base-line { stroke: var(--glass-border); stroke-width: 3; }

        #counter { font-size: 0.8rem; color: var(--accent-neon); margin-bottom: 10px; opacity: 0.8; }

        .next-btn { background: var(--success-glow); color: white; display: none; width: 100%; }

        @media (max-width: 480px) {
            .card { padding: 20px; }
            #word-display { font-size: 1.6rem; letter-spacing: 4px; }
            .key { height: 42px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

<audio id="ses-baslangic" src="baslangic.mp3"></audio>

</div>

let currentPool = [];
let currentIndex = 0;
let selectedW = "", selectedH = "", guessedArr = [], errCount = 0;
const limbs = ["p1", "p2", "p3", "p4", "p5", "p6"];

const trQWERTY = [
    ["Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P", "Ğ", "Ü"],
    ["A", "S", "D", "F", "G", "H", "J", "K", "L", "Ş", "İ"],
    ["Z", "X", "C", "V", "B", "N", "M", "Ö", "Ç"]
];

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function updateOutcomes() {
    const unit = document.getElementById('unit-select').value;
    const outBox = document.getElementById('outcome-select');
    outBox.innerHTML = '<option value="">-- Öğrenme Çıktısı Seçin --</option>';
    if(unit && curriculumData[unit]) {
        Object.keys(curriculumData[unit]).forEach(o => {
            const el = document.createElement('option');
            el.value = o; el.textContent = o;
            outBox.appendChild(el);
        });
    }
}

function startGame() {
    const u = document.getElementById('unit-select').value;
    const o = document.getElementById('outcome-select').value;
    if(!u || !o) return;

    // Başlangıç Sesi
    document.getElementById('ses-baslangic').play();

    currentPool = shuffle([...curriculumData[u][o]]);
    currentIndex = 0;
    
    document.getElementById('setup-area').style.display = 'none';
    document.getElementById('game-area').style.display = 'block';
    loadNextQuestion();
}

function loadNextQuestion() {
    if(currentIndex >= currentPool.length) {
        document.getElementById('status-msg').innerHTML = "<span style='color:var(--accent-neon)'>TEBRİKLER! TÜM KAVRAMLARI KEŞFETTİNİZ.</span>";
        document.getElementById('next-question-btn').style.display = 'none';
        return;
    }
    const item = currentPool[currentIndex];
    selectedW = item.w.toUpperCase();
    selectedH = item.h;
    
    guessedArr = [" ", "-", ".", "/"]; 
    
    errCount = 0;

    document.getElementById('counter').innerText = `KAVRAM: ${currentIndex + 1} / ${currentPool.length}`;
    document.getElementById('hint-display').innerText = selectedH;
    document.getElementById('status-msg').innerText = "";
    document.getElementById('next-question-btn').style.display = 'none';

    limbs.forEach(id => document.getElementById(id).style.display = 'none');
    renderTRKeyboard();
    updateWord();
}

function renderTRKeyboard() {
    const kbContainer = document.getElementById('keyboard');
    kbContainer.innerHTML = "";
    
    trQWERTY.forEach(row => {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'keyboard-row';
        row.forEach(char => {
            const keyDiv = document.createElement('div');
            keyDiv.className = 'key';
            keyDiv.innerText = char;
            keyDiv.onclick = () => handleInput(char, keyDiv);
            rowDiv.appendChild(keyDiv);
        });
        kbContainer.appendChild(rowDiv);
    });
}

function handleInput(l, el) {
    if(el.classList.contains('disabled')) return;
    el.classList.add('disabled');

    if(selectedW.includes(l)) {
        // Doğru Sesi
        document.getElementById('ses-dogru').play();
        guessedArr.push(l);
        el.classList.add('correct');
    } else {
        // Yanlış Sesi
        document.getElementById('ses-yanlis').play();
        el.classList.add('wrong');
        if(errCount < limbs.length) {
            document.getElementById(limbs[errCount]).style.display = 'block';
            errCount++;
        }
    }
    updateWord();
    checkEnd();
}

function updateWord() {
    const displayElement = document.getElementById('word-display');
    const wordCharacters = selectedW.split("");
    
    const htmlOutput = wordCharacters.map(char => {
        if (char === " ") {
            return '<span style="display:inline-block; width:15px;"> </span>'; 
        } else if (guessedArr.includes(char)) {
            return char; 
        } else {
            return "_"; 
        }
    }).join(" ");
    
    displayElement.innerHTML = htmlOutput;
}

function checkEnd() {
    const currentDisplay = selectedW.split("").map(l => (guessedArr.includes(l) ? l : "_")).join("");
    
    if(currentDisplay === selectedW) {
        document.getElementById('status-msg').innerHTML = "<span style='color:var(--success-glow)'>MÜKEMMEL! DOĞRU CEVAP.</span>";
        currentIndex++;
        document.getElementById('next-question-btn').style.display = 'block';
        lockKb();
    } else if(errCount >= limbs.length) {
        // Kaybetme Sesi
        document.getElementById('ses-kayip').play();
        document.getElementById('status-msg').innerHTML = "<span style='color:var(--error-glow)'>CEVAP: " + selectedW + "</span>";
        currentIndex++;
        document.getElementById('next-question-btn').style.display = 'block';
        lockKb();
    }
}

function lockKb() {
    document.querySelectorAll('.key').forEach(k => k.classList.add('disabled'));
}
